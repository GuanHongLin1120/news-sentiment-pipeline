apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-service
  labels:
    app: scoring-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scoring-service
  template:
    metadata:
      labels:
        app: scoring-service
    spec:
      containers:
        - name: scoring-service
          image: scoring-service:latest
          imagePullPolicy: Never
          env:
            # Inject the Gemini API key from the Kubernetes Secret
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secret
                  key: GEMINI_API_KEY
            # Kafka runs in-cluster; the pod reaches it via the internal
            # Service DNS name. (Postgres is NOT accessed from this pod —
            # db_writer.py runs on the host and writes to Postgres directly.)
            - name: KAFKA_BOOTSTRAP
              value: "kafka-service:9092"